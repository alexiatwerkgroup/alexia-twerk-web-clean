<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Account confirmation | Alexia Twerk Group</title>
<meta name="robots" content="noindex,nofollow">
<link rel="canonical" href="https://alexiatwerkgroup.com/auth-callback.html">
<style>
  :root{--bg:#07070c;--bg2:#111118;--line:rgba(255,255,255,.08);--txt:#f4f4f8;--mut:rgba(255,255,255,.68);--gold:#e8c880;--pink:#ff2d87;--ok:#38d9a9;--err:#ff7878;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:grid;place-items:center;padding:20px;background:radial-gradient(900px 600px at 15% 10%,rgba(255,46,99,.12),transparent 55%),radial-gradient(900px 600px at 85% 20%,rgba(0,255,170,.10),transparent 55%),linear-gradient(180deg,var(--bg),var(--bg2));color:var(--txt);font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
  .card{width:min(100%,520px);border:1px solid var(--line);border-radius:24px;background:rgba(255,255,255,.03);padding:32px 28px;box-shadow:0 35px 90px rgba(0,0,0,.45);}
  .crest{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#ff5fa3,#a32f6e);color:#fff;font:800 13px/1 ui-sans-serif;letter-spacing:.06em;margin-bottom:14px;}
  .kicker{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mut);margin-bottom:8px;}
  h1{font-size:30px;line-height:1.1;margin-bottom:10px;letter-spacing:-.01em;}
  h1 em{color:var(--gold);font-style:italic;}
  p{color:var(--mut);line-height:1.55;font-size:14px;}
  .status{margin-top:18px;padding:14px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.03);font-size:14px;}
  .status.ok{border-color:rgba(0,255,170,.28);background:rgba(0,255,170,.08);color:#b8f5d6;}
  .status.err{border-color:rgba(255,120,120,.25);background:rgba(255,120,120,.08);color:#ffc4c4;}
  .form{margin-top:18px;display:none;}
  .form.is-active{display:block;}
  label{display:block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mut);margin-bottom:6px;margin-top:12px;}
  input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.03);color:var(--txt);font:400 15px/1.4 ui-sans-serif;}
  input:focus{outline:none;border-color:rgba(255,45,135,.45);}
  .btn{display:inline-flex;align-items:center;justify-content:center;width:100%;margin-top:16px;padding:13px 16px;border-radius:14px;border:none;cursor:pointer;background:linear-gradient(145deg,var(--pink),#a32f6e);color:#fff;font:700 14px/1 ui-sans-serif;letter-spacing:.04em;}
  .btn[disabled]{opacity:.5;cursor:wait;}
  .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,.18);color:var(--mut);font-weight:500;letter-spacing:.06em;}
  .err{color:var(--err);font-size:13px;margin-top:8px;display:none;}
  .err.is-visible{display:block;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
</head>
<body>

<div class="card">
  <div class="crest">A·T</div>
  <div class="kicker" id="kicker">Alexia Twerk Group</div>
  <h1 id="title">Confirming…</h1>
  <p id="subtitle">Hold on while we finish setting things up.</p>

  <div id="status" class="status">Working…</div>

  <!-- Recovery: new password form -->
  <form id="recovery-form" class="form" novalidate>
    <label for="np">New password</label>
    <input id="np" type="password" autocomplete="new-password" minlength="6" maxlength="120" required placeholder="At least 6 characters">
    <label for="np2">Confirm new password</label>
    <input id="np2" type="password" autocomplete="new-password" minlength="6" maxlength="120" required placeholder="Repeat the password">
    <p class="err" id="rec-err"></p>
    <button type="submit" class="btn" id="rec-btn">Update password</button>
  </form>

  <a id="goback" class="btn ghost" href="/account.html" style="text-decoration:none;margin-top:12px;display:none;">Go to my account</a>
</div>

<script>
(function(){
  'use strict';
  const SUPABASE_URL = 'https://vieqniahusdrfkpcuqsn.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpZXFuaWFodXNkcmZrcGN1cXNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTk2NjksImV4cCI6MjA4ODk5NTY2OX0.Ox8gUp0g-aYRvI2Zj6PWxx5unO3m3sEtal0OKLvPSkQ';

  // CRITICAL: must match the storageKey used by /assets/supabase-config.js
  // ('alexia-auth-v3'). Otherwise the session set here won't be visible to
  // the rest of the site and the user will appear logged out.
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true, storageKey: 'alexia-auth-v3', flowType: 'pkce' }
  });

  const $ = (id) => document.getElementById(id);
  const status = $('status');
  const title = $('title');
  const subtitle = $('subtitle');
  const kicker = $('kicker');
  const recForm = $('recovery-form');
  const goback = $('goback');
  const recErr = $('rec-err');

  function setStatus(msg, kind){
    status.innerHTML = msg;
    status.className = 'status ' + (kind || '');
  }
  function showError(m){ recErr.textContent = m; recErr.classList.add('is-visible'); }

  const params = new URLSearchParams(location.search);
  const isRecovery = params.get('recovery') === '1' || params.get('type') === 'recovery';
  const returnTo = params.get('returnTo') || '/account.html';

  async function handleRecovery(){
    kicker.textContent = 'Password recovery';
    title.innerHTML = 'Set a <em>new password</em>.';
    subtitle.textContent = 'Choose a new password for your account. You will be signed in automatically.';

    // Wait for Supabase to detect the session-from-URL fragment.
    await new Promise(r => setTimeout(r, 400));
    const { data: sessData } = await sb.auth.getSession();
    if (!sessData || !sessData.session) {
      setStatus('Reset link expired or already used. Request a new recovery email from /account.html.', 'err');
      goback.style.display = 'inline-flex';
      return;
    }

    setStatus('Reset link verified. Pick a new password below.', 'ok');
    recForm.classList.add('is-active');

    recForm.addEventListener('submit', async function(ev){
      ev.preventDefault();
      recErr.classList.remove('is-visible');
      const np = $('np').value;
      const np2 = $('np2').value;
      if (np.length < 6) return showError('Password must be at least 6 characters.');
      if (np !== np2) return showError('Passwords do not match.');

      const btn = $('rec-btn');
      btn.disabled = true; btn.textContent = 'Updating…';
      try {
        const { error } = await sb.auth.updateUser({ password: np });
        if (error) {
          btn.disabled = false; btn.textContent = 'Update password';
          return showError(error.message || 'Could not update password.');
        }
        setStatus('Password updated. Sending you to your account…', 'ok');
        recForm.style.display = 'none';
        setTimeout(function(){ location.replace('/account.html'); }, 1200);
      } catch(e){
        btn.disabled = false; btn.textContent = 'Update password';
        showError('Error: ' + (e && e.message || 'unknown'));
      }
    });
  }

  async function handleConfirmation(){
    kicker.textContent = 'Account confirmation';
    title.innerHTML = 'Confirming your <em>account</em>.';
    subtitle.textContent = 'Almost done. Sending you to your dashboard.';

    // Give the SDK a beat to consume the URL fragment.
    await new Promise(r => setTimeout(r, 350));
    const { data } = await sb.auth.getSession();
    if (data && data.session) {
      setStatus('Email confirmed. Welcome.', 'ok');
      setTimeout(function(){ location.replace(returnTo); }, 900);
      return;
    }
    setStatus('Confirmation processed. Redirecting you to your account…', 'ok');
    setTimeout(function(){ location.replace(returnTo); }, 1200);
  }

  if (isRecovery) handleRecovery().catch(function(e){
    console.error('recovery flow', e);
    setStatus('Recovery flow failed. Open /account.html and request a new reset link.', 'err');
    goback.style.display = 'inline-flex';
  });
  else handleConfirmation().catch(function(e){
    console.error('confirmation flow', e);
    setStatus('Confirmation flow failed. Open /account.html to sign in manually.', 'err');
    goback.style.display = 'inline-flex';
  });
})();
</script>

</body>
</html>
