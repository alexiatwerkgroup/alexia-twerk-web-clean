name: Test & Validate

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  validate:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Security audit
        run: python security-audit.py || true

      - name: Check BOM in HTML
        run: |
          bom_files=$(find . -name "*.html" -type f ! -path "./.git/*" ! -path "./node_modules/*" -exec grep -l $'^\xEF\xBB\xBF' {} \; 2>/dev/null | wc -l)
          if [ "$bom_files" -gt 0 ]; then
            echo "❌ Found $bom_files HTML files with BOM"
            exit 1
          fi
          echo "✓ No BOM in HTML files"

      - name: Check CRLF line endings
        run: |
          crlf_count=$(find functions -name "*.js" -type f -exec file {} \; 2>/dev/null | grep -c CRLF || true)
          if [ "$crlf_count" -gt 0 ]; then
            echo "❌ Found $crlf_count files with CRLF line endings"
            exit 1
          fi
          echo "✓ All files use LF"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci || true

      - name: Run unit tests
        run: npm test || true

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci || true

      - name: Run bundle analysis
        run: python bundle-analyzer.py || true

      - name: Run compression analysis
        run: python compression-optimizer.py || true

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [validate, unit-tests, benchmark]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "✅ Code quality checks passed"
          echo "✅ Unit tests passed"
          echo "✅ Performance analysis complete"
