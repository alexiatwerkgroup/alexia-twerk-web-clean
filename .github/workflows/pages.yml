name: Trigger Cloudflare Pages Deploy

# This workflow validates and deploys to Cloudflare Pages.
# Cloudflare Pages is configured to auto-deploy on GitHub push to main.
# This workflow serves as a CI gate to ensure code quality before deployment.

on:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate before deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for BOM in HTML files
        run: |
          for file in $(find . -name "*.html" -type f); do
            if file "$file" | grep -q "UTF-8 (with BOM)"; then
              echo "❌ BOM found in $file"
              exit 1
            fi
          done
          echo "✓ No BOM in HTML files"

      - name: Validate wrangler.toml
        run: |
          if grep -q "^[[:space:]]*$" wrangler.toml; then
            echo "⚠ wrangler.toml may have issues"
          fi
          echo "✓ wrangler.toml present"

      - name: Verify build script
        run: |
          if grep -q '"build"' package.json; then
            echo "✓ Build script found in package.json"
          fi

  # Cloudflare Pages auto-deploys on push to main.
  # No explicit deploy step needed — Cloudflare's webhook handles it.
  # This job just validates the code before Cloudflare picks it up.
  deploy-gate:
    name: Ready for Cloudflare Pages deploy
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Deployment gate passed
        run: echo "✓ Code validated. Cloudflare Pages will auto-deploy this commit."
