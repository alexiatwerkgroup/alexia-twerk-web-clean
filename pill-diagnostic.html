<script>
// Comprehensive pill diagnostic
setTimeout(function() {
  var pill = document.querySelector('.twerkhub-tokens-hud');
  
  if (!pill) {
    console.error('[DIAGNOSTIC] PILL NOT FOUND!');
    return;
  }
  
  var cs = window.getComputedStyle(pill);
  var parent = pill.parentElement;
  var parentCS = window.getComputedStyle(parent);
  
  var diagnostic = {
    '=== PILL ===': '',
    'tag': pill.tagName,
    'classList': pill.className,
    'position': cs.position,
    'top': cs.top,
    'right': cs.right,
    'z-index': cs.zIndex,
    'transform': cs.transform,
    'overflow': cs.overflow,
    'display': cs.display,
    'visibility': cs.visibility,
    'pointerEvents': cs.pointerEvents,
    '=== PARENT ===': '',
    'parent.tag': parent.tagName,
    'parent.className': parent.className,
    'parent.position': parentCS.position,
    'parent.overflow': parentCS.overflow,
    'parent.display': parentCS.display,
  };
  
  Object.entries(diagnostic).forEach(function(entry) {
    var key = entry[0];
    var val = entry[1];
    if (key.startsWith('===')) {
      console.log('%c' + key, 'color: yellow; font-weight: bold');
    } else {
      console.log(key + ': ' + val);
    }
  });
  
  console.log('\n%cDEBUG INFO:', 'color: cyan; font-weight: bold');
  console.log('rect.top:', pill.getBoundingClientRect().top);
  console.log('rect.right:', pill.getBoundingClientRect().right);
  
}, 1000);
</script>
