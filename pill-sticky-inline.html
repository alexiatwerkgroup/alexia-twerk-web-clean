<script>
// Inline sticky pill - executes immediately
(function() {
  // Ejecutar cada 100ms hasta que funcione
  var attempts = 0;
  var interval = setInterval(function() {
    var pill = document.querySelector('.twerkhub-tokens-hud');
    
    if (pill) {
      console.log('[PILL] Found, applying sticky...');
      
      // Aplicar sticky
      pill.style.position = 'sticky';
      pill.style.top = '10px';
      pill.style.right = '14px';
      pill.style.zIndex = '99';
      
      // Remover transform si bloquea
      pill.style.transform = 'none';
      
      // Log result
      var cs = window.getComputedStyle(pill);
      console.log('[PILL] position=' + cs.position + ', top=' + cs.top);
      
      clearInterval(interval);
    }
    
    attempts++;
    if (attempts > 50) {
      console.log('[PILL] ERROR: Pill never found after 5 seconds');
      clearInterval(interval);
    }
  }, 100);
})();
</script>
