<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlists - Alexia Twerk Group</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Model 1: Dark Premium Colors */
            --bg-primary: #0a0e27;
            --bg-secondary: #0f1435;
            --bg-tertiary: #1a1f3a;
            --accent-primary: #00d4ff;
            --accent-secondary: #00a8cc;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-tertiary: #787878;
            --border-color: #1a1f3a;

            /* Spacing */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 20px;

            /* Typography */
            --font-primary: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;

            /* Transitions */
            --transition-fast: 0.2s ease-in-out;
            --transition-smooth: 0.3s ease-in-out;
        }

        body {
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            font-family: var(--font-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* HEADER & NAVIGATION */
        .playlist-header {
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(10px);
            padding: var(--spacing-xl) var(--spacing-xl);
            border-bottom: 1px solid var(--border-color);
            margin-bottom: var(--spacing-xl);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-container {
            max-width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: var(--spacing-lg);
        }

        .playlist-title {
            font-size: clamp(20px, 5vw, 32px);
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, var(--accent-primary), #00a8cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .filter-controls {
            display: flex;
            gap: var(--spacing-md);
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: var(--spacing-sm) var(--spacing-lg);
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all var(--transition-fast);
        }

        .filter-btn:hover {
            background: var(--bg-secondary);
            color: var(--accent-primary);
            border-color: var(--accent-primary);
        }

        .filter-btn.active {
            background: var(--accent-primary);
            color: var(--bg-primary);
            border-color: var(--accent-primary);
        }

        /* MAIN CONTENT */
        .playlist-container {
            max-width: 100%;
            padding: 0 var(--spacing-xl);
            margin-bottom: var(--spacing-xl);
        }

        .playlist-hero {
            display: grid;
            grid-template-columns: 65% 35%;
            gap: var(--spacing-xl);
            margin-bottom: var(--spacing-xl);
        }

        /* VIDEO PRINCIPAL */
        .main-video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all var(--transition-smooth);
            background: var(--bg-tertiary);
        }

        .main-video-wrapper:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 48px rgba(0, 212, 255, 0.2);
        }

        .main-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity var(--transition-smooth);
        }

        .main-video-wrapper:hover .video-overlay {
            opacity: 1;
        }

        .play-icon {
            width: 64px;
            height: 64px;
            background: var(--accent-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: var(--bg-primary);
            transition: transform var(--transition-fast);
        }

        .main-video-wrapper:hover .play-icon {
            transform: scale(1.1);
        }

        .video-paywall-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: var(--spacing-lg);
            cursor: pointer;
            transition: background var(--transition-fast);
        }

        .main-video-wrapper:hover .video-paywall-overlay {
            background: rgba(0, 0, 0, 0.75);
        }

        .lock-icon {
            font-size: 48px;
            color: var(--accent-primary);
        }

        .paywall-text {
            color: var(--text-primary);
            font-size: 14px;
            text-align: center;
        }

        /* TOP 5 RANKING SIDEBAR */
        .ranking-sidebar {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
            height: 100%;
        }

        .ranking-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-primary);
            padding-bottom: var(--spacing-sm);
            border-bottom: 2px solid var(--border-color);
        }

        .ranking-videos {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
            flex: 1;
        }

        .ranking-video {
            position: relative;
            aspect-ratio: 16 / 9;
            border-radius: 6px;
            overflow: hidden;
            background: var(--bg-tertiary);
            cursor: pointer;
            transition: all var(--transition-smooth);
            group: ranking-video;
        }

        .ranking-video:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.15);
        }

        .ranking-thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: brightness var(--transition-fast);
        }

        .ranking-video:hover .ranking-thumbnail {
            filter: brightness(0.85);
        }

        .ranking-badge {
            position: absolute;
            top: var(--spacing-sm);
            left: var(--spacing-sm);
            background: rgba(0, 212, 255, 0.2);
            backdrop-filter: blur(8px);
            color: var(--accent-primary);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            border: 1px solid rgba(0, 212, 255, 0.4);
        }

        .ranking-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .ranking-video:hover .ranking-overlay {
            opacity: 1;
        }

        .ranking-play {
            width: 40px;
            height: 40px;
            background: var(--accent-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-primary);
            font-size: 18px;
        }

        /* GRID DE VIDEOS */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--spacing-lg);
            margin-top: var(--spacing-xl);
        }

        .video-card {
            position: relative;
            aspect-ratio: 16 / 9;
            border-radius: 6px;
            overflow: hidden;
            background: var(--bg-tertiary);
            cursor: pointer;
            transition: all var(--transition-smooth);
            display: flex;
            flex-direction: column;
        }

        .video-card-image {
            flex: 1;
            width: 100%;
            overflow: hidden;
        }

        .video-thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition-smooth);
        }

        .video-card:hover .video-thumbnail {
            transform: scale(1.05);
            filter: brightness(0.85);
        }

        .video-card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition-fast);
        }

        .video-card:hover .video-card-overlay {
            background: rgba(0, 0, 0, 0.4);
        }

        .card-play-icon {
            width: 50px;
            height: 50px;
            background: var(--accent-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-primary);
            font-size: 24px;
            opacity: 0;
            transform: scale(0.8);
            transition: all var(--transition-fast);
        }

        .video-card:hover .card-play-icon {
            opacity: 1;
            transform: scale(1);
        }

        .video-card-paywall {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .card-lock-icon {
            font-size: 32px;
            color: var(--accent-primary);
        }

        /* PAYWALL MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn var(--transition-smooth);
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: var(--spacing-xl) var(--spacing-xl);
            width: 90%;
            max-width: 500px;
            text-align: center;
            animation: slideUp var(--transition-smooth);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-icon {
            font-size: 48px;
            margin-bottom: var(--spacing-lg);
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: var(--spacing-md);
            color: var(--text-primary);
        }

        .modal-text {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: var(--spacing-xl);
        }

        .modal-text strong {
            color: var(--accent-primary);
        }

        .modal-buttons {
            display: flex;
            gap: var(--spacing-lg);
            justify-content: center;
            flex-wrap: wrap;
        }

        .modal-btn {
            padding: var(--spacing-md) var(--spacing-xl);
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all var(--transition-fast);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .modal-btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: var(--bg-primary);
        }

        .modal-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3);
        }

        .modal-btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .modal-btn-secondary:hover {
            background: var(--border-color);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        /* RESPONSIVE DESIGN */
        @media (max-width: 1199px) {
            :root {
                --spacing-xl: 16px;
                --spacing-lg: 12px;
            }

            .playlist-hero {
                grid-template-columns: 60% 40%;
                gap: var(--spacing-lg);
            }

            .videos-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .playlist-title {
                font-size: clamp(18px, 4vw, 28px);
            }
        }

        @media (max-width: 768px) {
            :root {
                --spacing-xl: 12px;
                --spacing-lg: 8px;
            }

            .playlist-header {
                padding: var(--spacing-lg) var(--spacing-md);
                margin-bottom: var(--spacing-lg);
            }

            .header-container {
                flex-direction: column;
                align-items: flex-start;
            }

            .playlist-container {
                padding: 0 var(--spacing-md);
            }

            .playlist-hero {
                grid-template-columns: 1fr;
                gap: var(--spacing-lg);
            }

            .ranking-sidebar {
                flex-direction: row;
                overflow-x: auto;
                padding-bottom: var(--spacing-md);
            }

            .ranking-videos {
                flex-direction: row;
                gap: var(--spacing-sm);
            }

            .ranking-video {
                flex: 0 0 140px;
                min-width: 140px;
            }

            .videos-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: var(--spacing-md);
            }

            .playlist-title {
                font-size: clamp(16px, 3vw, 22px);
            }

            .filter-controls {
                width: 100%;
                justify-content: flex-start;
            }

            .modal-content {
                width: 95%;
                padding: var(--spacing-lg) var(--spacing-lg);
            }
        }

        /* SKELETON LOADING */
        @keyframes skeleton-loading {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        .skeleton {
            background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--border-color) 50%, var(--bg-tertiary) 75%);
            background-size: 1000px 100%;
            animation: skeleton-loading 2s infinite;
            border-radius: 6px;
        }

        /* ACCESSIBILITY */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        /* LOADING INDICATOR */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 212, 255, 0.3);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

        // Initialize page
        function init() {
            updatePlaylistTitle();
            renderRankingVideos();
            renderVideoGrid();
            attachEventListeners();
        }

        function updatePlaylistTitle() {
            document.getElementById('playlistTitle').textContent = currentPlaylist.title;
        }

        function renderRankingVideos() {
            const rankingContainer = document.getElementById('rankingVideos');
            rankingContainer.innerHTML = '';

            currentPlaylist.videos.slice(0, 5).forEach((video, index) => {
                const videoEl = document.createElement('div');
                videoEl.className = 'ranking-video';
                videoEl.innerHTML = `
                    <img class="ranking-thumbnail" src="${video.thumb}" alt="${video.title}">
                    <div class="ranking-badge">${index + 1}</div>
                    <div class="ranking-overlay">
                        <div class="ranking-play">▶</div>
                    </div>
                `;
                videoEl.addEventListener('click', () => handleVideoClick(video));
                rankingContainer.appendChild(videoEl);
            });
        }

        function renderVideoGrid() {
            const gridContainer = document.getElementById('videosGrid');
            gridContainer.innerHTML = '';

            currentPlaylist.videos.forEach((video) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'video-card';

                const paywallClass = video.paywall ? 'paywall-locked' : '';
                cardEl.classList.add(paywallClass);

                cardEl.innerHTML = `
                    <div class="video-card-image">
                        <img class="video-thumbnail" src="${video.thumb}" alt="${video.title}">
                    </div>
                    <div class="video-card-overlay">
                        <div class="card-play-icon">▶</div>
                    </div>
                    ${video.paywall ? `
                        <div class="video-card-paywall">
                            <div class="card-lock-icon">🔒</div>
                        </div>
                    ` : ''}
                `;

                cardEl.addEventListener('click', () => handleVideoClick(video));
                gridContainer.appendChild(cardEl);
            });
        }

        function handleVideoClick(video) {
            if (video.paywall) {
                openModal();
            } else {
                console.log('Playing video:', video.title);
                // In production, this would navigate to the video player
            }
        }

        function openModal() {
            document.getElementById('paywallModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('paywallModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Close modal on outside click
        document.getElementById('paywallModal').addEventListener('click', (e) => {
            if (e.target.id === 'paywallModal') {
                closeModal();
            }
        });

        // Filter buttons
        function attachEventListeners() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    // In production, filter videos based on data attributes
                });
            });
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', init);
