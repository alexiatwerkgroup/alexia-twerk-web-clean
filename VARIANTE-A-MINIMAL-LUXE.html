<!-- VARIANTE A: MINIMAL LUXE - Thumbnails muy pequeños, compacto y elegante -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variante A - Minimal Luxe</title>
    <style>
        .hot-ranking {
            background: linear-gradient(135deg, #0f0f1f 0%, #1a1a2e 50%, #252840 100%);
            border-radius: 25px;
            border: 3px solid #ffb454;
            padding: 2.5rem;
            box-shadow: 0 30px 100px rgba(255, 180, 84, 0.4);
            position: relative;
            backdrop-filter: blur(10px);
        }

        .hot-ranking::before {
            content: '👑';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
        }

        .hot-ranking h3 {
            background: linear-gradient(135deg, #ffb454, #ffc470);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2rem;
            font-size: 1.8rem;
            font-weight: 900;
            text-align: center;
            letter-spacing: 2px;
        }

        .ranking-item {
            margin-bottom: 1.2rem;
            padding: 0.8rem;
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 1rem;
            align-items: start;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 12px;
        }

        .ranking-item:hover {
            background: rgba(255, 180, 84, 0.08);
            padding-left: 1.2rem;
        }

        .ranking-thumbnail {
            width: 100px;
            aspect-ratio: 16/9;
            border-radius: 10px;
            border: 2px solid rgba(255, 180, 84, 0.3);
            object-fit: cover;
            transition: all 0.3s ease;
        }

        .ranking-item:hover .ranking-thumbnail {
            border-color: #ffb454;
            box-shadow: 0 5px 15px rgba(255, 180, 84, 0.2);
        }

        .ranking-content {
            min-width: 0;
        }

        .ranking-title {
            font-weight: 700;
            color: #ffb454;
            font-size: 0.9rem;
            line-height: 1.3;
            margin-bottom: 0.3rem;
        }

        .ranking-meta {
            color: #b0a080;
            font-size: 0.75rem;
            font-weight: 500;
        }
    </style>
</head>
<body style="background: #0a0a1f; padding: 40px 20px;">
