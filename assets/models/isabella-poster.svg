<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 960" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Isabella preview · Coming soon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a0822"/>
      <stop offset="45%" stop-color="#5a1a4d"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ff2d87" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#9d4edd" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="initials-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6fa8"/>
      <stop offset="55%" stop-color="#ffb454"/>
      <stop offset="100%" stop-color="#ffd693"/>
    </linearGradient>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Base gradient -->
  <rect width="720" height="960" fill="url(#bg)"/>

  <!-- Soft glow center-top -->
  <rect width="720" height="960" fill="url(#glow)"/>

  <!-- Animated grain blobs (static for poster — no animation in SVG poster) -->
  <circle cx="180" cy="720" r="220" fill="#ff2d87" fill-opacity="0.08" filter="url(#softblur)"/>
  <circle cx="560" cy="820" r="170" fill="#1ee08f" fill-opacity="0.06" filter="url(#softblur)"/>

  <!-- Big initials IB -->
  <text x="360" y="440" text-anchor="middle"
        font-family="Playfair Display, Georgia, serif" font-size="340" font-weight="900"
        fill="url(#initials-grad)" letter-spacing="-12">IB</text>

  <!-- Name -->
  <text x="360" y="540" text-anchor="middle"
        font-family="Playfair Display, Georgia, serif" font-size="56" font-weight="900"
        fill="#f5f5fb" letter-spacing="1">Isabella</text>

  <!-- Kicker line with mono font -->
  <text x="360" y="590" text-anchor="middle"
        font-family="JetBrains Mono, ui-monospace, monospace" font-size="18" font-weight="700"
        fill="#ffd8ea" letter-spacing="4">BRA · 23 · OF VIP</text>

  <!-- Coming-soon bar -->
  <rect x="210" y="660" width="300" height="2" fill="#ff6fa8" fill-opacity="0.65"/>
  <text x="360" y="700" text-anchor="middle"
        font-family="JetBrains Mono, ui-monospace, monospace" font-size="15" font-weight="800"
        fill="#ff6fa8" letter-spacing="5">PREVIEW LOADING…</text>

  <!-- Outline frame -->
  <rect x="14" y="14" width="692" height="932" rx="18" ry="18"
        fill="none" stroke="#ffb454" stroke-opacity="0.25" stroke-width="2"/>
</svg>
