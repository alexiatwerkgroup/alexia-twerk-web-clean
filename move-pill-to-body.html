<script>
// Move pill out of its container to body so sticky works
(function() {
  var attempts = 0;
  var moveInterval = setInterval(function() {
    var pill = document.querySelector('.twerkhub-tokens-hud');
    if (!pill) {
      attempts++;
      if (attempts > 50) clearInterval(moveInterval); // 5 segundos max
      return;
    }
    
    // Move pill to body
    document.body.appendChild(pill);
    
    // Apply sticky CSS
    pill.style.position = 'sticky';
    pill.style.top = '10px';
    pill.style.right = '14px';
    pill.style.zIndex = '999';
    
    console.log('[PILL-MOVE] Moved to body and applied sticky');
    clearInterval(moveInterval);
  }, 100);
})();
</script>
