# wrangler.toml - Cloudflare Pages configuration
# Auto-binds D1 database when this file is pushed to GitHub

name = "alexia-twerk-web-clean"
compatibility_date = "2026-05-11"
pages_build_output_dir = "."

# D1 database binding for twerkhub-subscribers
[[d1_databases]]
binding = "DB"
database_name = "twerkhub-subscribers"
database_id = "a9203ef0-3f9d-4a1d-bd44-4a9748504afd"

# R2 bucket binding for avatar storage
[[r2_buckets]]
binding = "AVATARS"
bucket_name = "twerkhub-avatars"

# Environment variables must be set in Cloudflare Pages dashboard:
# JWT_SECRET - random 48+ byte string for signing auth JWTs
